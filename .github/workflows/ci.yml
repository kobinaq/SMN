name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    name: Web checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_WHATSAPP_INVITE: https://chat.whatsapp.com/example
      PAYLOAD_SECRET: ci-payload-secret-change-me-only-in-ci
      DATABASE_URL: file:./payload.db
      OPS_EMAIL: hello@example.com
      CRON_SECRET: ci-cron-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Reset local SQLite artifacts
        # Prevent stale local payload.db from breaking importmap/build with "index already exists".
        run: rm -f payload.db payload.db-shm payload.db-wal payload.importmap-*.db payload.e2e-*.db

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Prepare fresh SQLite schema
        # CI uses file:./payload.db. Create schema once with an explicit push (connect never auto-pushes).
        run: npm run db:ensure-sqlite

      - name: Production build
        run: npm run build

      - name: End-to-end smoke tests
        run: npm run test:e2e
